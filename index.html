<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống thi trắc nghiệm PTIT</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <img src="assets/images/ptit-logo.png" alt="Logo PTIT" class="auth-logo">
            <h1>Hệ thống thi trắc nghiệm</h1>
            <p>Đại học Công nghệ Thông tin và Truyền thông</p>
        </div>
        
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Đăng nhập</button>
            <button class="tab-btn" data-tab="register">Đăng ký</button>
        </div>
        
        <!-- Form Đăng nhập -->
        <form id="loginForm" class="auth-form active">
            <div class="form-group">
                <label for="loginUsername">Tên đăng nhập</label>
                <input type="text" id="loginUsername" name="username" required>
                <span class="error-message"></span>
            </div>
            
            <div class="form-group">
                <label for="loginPassword">Mật khẩu</label>
                <input type="password" id="loginPassword" name="password" required>
                <span class="error-message"></span>
            </div>
            
            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" id="rememberMe">
                    <span class="checkmark"></span>
                    Ghi nhớ đăng nhập
                </label>
                <a href="#" class="forgot-password">Quên mật khẩu?</a>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Đăng nhập</button>
        </form>
        
        <!-- Form Đăng ký -->
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="registerName">Họ và tên</label>
                <input type="text" id="registerName" name="fullname" required>
                <span class="error-message"></span>
            </div>
            
            <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" name="email" required>
                <span class="error-message"></span>
            </div>
            
            <div class="form-group">
                <label for="registerUsername">Tên đăng nhập</label>
